id: adb5a2c2-eee7-4dbb-a708-86c7f53cd81a
name: quality-gate
description: Full quality pipeline — lint, knip, tests, and CodeScene in parallel, then spec-coverage, coverage, deno ext tests, patch-coverage, then mutation
tags: {}
version: 1
reports:
  require:
    - "@focusin/quality-gate-summary"
jobs:
  - name: check
    description: Lint, knip, tests, and CodeScene health — run in parallel
    steps:
      - name: lint
        description: Run ESLint and store pass/fail result
        task:
          type: model_method
          modelIdOrName: focusin-lint
          methodName: check
      - name: knip
        description: Run knip dead-code check and store pass/fail result
        task:
          type: model_method
          modelIdOrName: focusin-knip
          methodName: check
      - name: tests
        description: Run vitest and cucumber (not @wip) and verify all pass
        task:
          type: model_method
          modelIdOrName: focusin-tests
          methodName: test
      - name: codescene-health
        description: Run cs delta main and store degraded file scores
        task:
          type: model_method
          modelIdOrName: focusin-codescene
          methodName: check

  - name: spec-coverage
    description: Check every scenario in openspec/specs/ has a boundary test or feature file entry
    dependsOn:
      - job: check
        condition:
          type: succeeded
    steps:
      - name: spec-coverage
        description: Check spec scenario coverage across tests and feature files
        allowFailure: false
        task:
          type: model_method
          modelIdOrName: focusin-spec-coverage
          methodName: run

  - name: coverage
    description: Run vitest with coverage and verify thresholds (90% lines/branches/functions/statements)
    dependsOn:
      - job: check
        condition:
          type: succeeded
    steps:
      - name: coverage
        description: Run coverage and store percentages
        task:
          type: model_method
          modelIdOrName: focusin-tests
          methodName: coverage

  - name: deno-ext
    description: Run deno extension model tests and append lcov coverage data
    dependsOn:
      - job: coverage
        condition:
          type: succeeded
    steps:
      - name: deno-ext-tests
        description: Run deno test on extensions/models/ and append lcov to coverage/lcov.info
        task:
          type: model_method
          modelIdOrName: focusin-deno-ext-tests
          methodName: run

  - name: patch-coverage
    description: Verify every staged added line is hit by the combined coverage report
    dependsOn:
      - job: deno-ext
        condition:
          type: succeeded
    steps:
      - name: patch-coverage
        description: Check patch coverage against full branch diff vs main
        task:
          type: model_method
          modelIdOrName: focusin-patch-coverage
          methodName: check
          inputs:
            mode: branch

  - name: mutation
    description: Run Stryker mutation testing — only if all preceding jobs pass
    dependsOn:
      - job: patch-coverage
        condition:
          type: succeeded
    steps:
      - name: mutation
        description: Run Stryker and store per-file mutation scores
        task:
          type: model_method
          modelIdOrName: focusin-mutation
          methodName: run

  - name: dashboard
    description: Sync telemetry and regenerate guardrails dashboard locally
    dependsOn:
      - job: mutation
        condition:
          type: completed
    steps:
      - name: generate-dashboard
        description: Sync new YAML files from .swamp/ and rebuild reports/workflow-insights/index.html
        allowFailure: true
        task:
          type: model_method
          modelType: "command/shell"
          modelName: focusin-dashboard
          methodName: execute
          inputs:
            run: "node scripts/sync-telemetry.js && node scripts/generate-guardrails-dashboard.js"
      - name: commit-telemetry
        description: Auto-commit any newly synced telemetry YAML files
        allowFailure: true
        task:
          type: model_method
          modelType: "command/shell"
          modelName: focusin-telemetry-commit
          methodName: execute
          inputs:
            run: "git add telemetry/ && git diff --cached --quiet || git commit -m 'telemetry: sync'"
