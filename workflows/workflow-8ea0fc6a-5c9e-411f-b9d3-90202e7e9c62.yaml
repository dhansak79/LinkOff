id: 8ea0fc6a-5c9e-411f-b9d3-90202e7e9c62
name: quality-gate-fast
description: Fast quality pipeline — lint, knip, spec-coverage, tests, and CodeScene in parallel, then coverage, deno ext tests, and patch-coverage
tags: {}
version: 1
jobs:
  - name: check
    description: Lint, knip, spec-coverage, tests, and CodeScene health — run in parallel
    steps:
      - name: lint
        description: Run ESLint and store pass/fail result
        task:
          type: model_method
          modelIdOrName: focusin-lint
          methodName: check
      - name: knip
        description: Run knip dead-code check and store pass/fail result
        task:
          type: model_method
          modelIdOrName: focusin-knip
          methodName: check
      - name: spec-coverage
        description: Check which spec scenarios have boundary tests
        allowFailure: true
        task:
          type: model_method
          modelIdOrName: focusin-spec-coverage
          methodName: run
      - name: tests
        description: Run vitest and verify all tests pass
        task:
          type: model_method
          modelIdOrName: focusin-tests
          methodName: test
      - name: codescene-health
        description: Run cs delta main and store degraded file scores
        task:
          type: model_method
          modelIdOrName: focusin-codescene
          methodName: check

  - name: coverage
    description: Run vitest with coverage and verify thresholds (90% lines/branches/functions/statements)
    dependsOn:
      - job: check
        condition:
          type: succeeded
    steps:
      - name: coverage
        description: Run coverage and store percentages
        task:
          type: model_method
          modelIdOrName: focusin-tests
          methodName: coverage

  - name: deno-ext
    description: Run deno extension model tests and append lcov coverage data
    dependsOn:
      - job: coverage
        condition:
          type: succeeded
    steps:
      - name: deno-ext-tests
        description: Run deno test on extensions/models/ and append lcov to coverage/lcov.info
        task:
          type: model_method
          modelIdOrName: focusin-deno-ext-tests
          methodName: run

  - name: patch-coverage
    description: Verify every staged added line is hit by the combined coverage report
    dependsOn:
      - job: deno-ext
        condition:
          type: succeeded
    steps:
      - name: patch-coverage
        description: Check patch coverage against staged diff
        task:
          type: model_method
          modelIdOrName: focusin-patch-coverage
          methodName: check
