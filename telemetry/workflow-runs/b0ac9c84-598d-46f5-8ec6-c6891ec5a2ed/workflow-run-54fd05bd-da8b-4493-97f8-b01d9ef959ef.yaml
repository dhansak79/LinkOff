                      done: true
                    - id: '1.4'
                      description: >-
                        Add POST_WITH_PROMOTED_BY_IN_BODY fixture to
                        tests/cucumber/screenplay/fixtures/posts.js: a post
                        whose only expandable-text-box body text contains the
