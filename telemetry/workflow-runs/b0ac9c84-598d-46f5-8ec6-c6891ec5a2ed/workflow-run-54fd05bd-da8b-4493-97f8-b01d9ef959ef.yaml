                      done: true
                    - id: '1.5'
                      description: >-
                        Mirror the same 4 fixtures (PROMOTED_BY_PAGE_POST,
                        PROMOTED_BY_PAGE_POST_NO_TEXTBOX,
                        PROMOTED_BY_PAGE_POST_WITH_AUTHOR,
                        POST_WITH_PROMOTED_BY_IN_BODY) as local consts at the
