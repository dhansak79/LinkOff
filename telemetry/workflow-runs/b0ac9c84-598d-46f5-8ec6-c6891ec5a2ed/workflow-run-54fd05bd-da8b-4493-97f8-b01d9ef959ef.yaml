    status: succeeded
    startedAt: '2026-07-02T12:52:50.565Z'
    completedAt: '2026-07-02T12:52:50.599Z'
    steps:
      - stepName: record
        status: succeeded
        startedAt: '2026-07-02T12:52:50.565Z'
        completedAt: '2026-07-02T12:52:50.598Z'
        output:
          type: model_method
          model: spec-change
          method: record-results
          resources:
            change:
              fix-promoted-by-page-detection:
                id: 12634d3e-c042-4fbe-916b-96e932308a43
                name: fix-promoted-by-page-detection
                version: 29
                isLatest: true
                createdAt: '2026-07-02T12:52:50.589Z'
                namespace: ''
                attributes:
                  name: fix-promoted-by-page-detection
                  phase: verifying
                  proposal_text: >
                    Why: The user has hide-promoted enabled but a post is still
                    showing. It contains LinkedIn's

                    "Promoted by <Company Page>" label (e.g. "Promoted by PyMC
                    Labs"), used when an individual's

                    post is boosted/sponsored via a company Page, distinct from
                    a plain "Promoted" ad. The detector

                    in isPromotedPost (src/features/feed.js:256-263) only
                    matches an element whose trimmed

                    textContent equals exactly "Promoted". Because "Promoted by"
                    wraps a nested

                    <a><strong>PyMC Labs</strong></a>, the containing element's
                    textContent is

                    "Promoted by PyMC Labs", not "Promoted", so the check
                    silently fails and the post is treated

                    as organic content. This is a real detection gap: the spec

                    (openspec/specs/hide-promoted-posts/spec.md) and its tests
                    only cover the standalone

                    "Promoted" label variant.


                    What: Extend isPromotedPost to also recognize the "Promoted
                    by <Page>" label pattern (leading

                    text "Promoted by" on a label element outside the post
                    body), in addition to the existing

                    exact-"Promoted" match. Do not loosen matching so broadly
                    that it catches organic uses of the

                    word "Promoted" inside post body text (existing
                    POST_WITH_PROMOTED_IN_BODY scenario must keep

                    passing). No changes to the hide-promoted toggle, storage
                    key, stats tracking, or

                    filter-ordering behavior. Add scenarios/tests for the
                    "Promoted by <Page>" variant (image-only

                    and text posts) to
                    tests/spec/hide-promoted-posts.spec.test.js and the cucumber
                    fixtures,

                    following the existing pattern.


                    Out of scope: Any other new "Promoted" label variants not
                    evidenced by an actual sample.

                    Reworking the broader slop/keyword filter pipeline.


                    Success criteria: A post containing the "Promoted by <Page>"
                    label is hidden when

                    hide-promoted is true. All existing hide-promoted-posts spec
                    scenarios still pass. New

                    scenario(s) covering "Promoted by <Page>" pass in both the
                    vitest spec suite and the cucumber

                    BDD suite.
                  design_text: >
                    Approach: Extend the existing isPromotedPost() detector in
                    src/features/feed.js

                    (currently an exact match on trimmed textContent ===
                    "Promoted") to also match labels

                    that begin with "Promoted by " (e.g. "Promoted by PyMC
                    Labs"). The check keeps the

                    existing exclusion of elements inside the
                    [data-testid="expandable-text-box"] post

                    body, so "Promoted by" appearing as ordinary prose in a
                    post's own text is never

                    matched (identical safety property to the existing
                    exact-"Promoted" case).


                    Files to change:

                    - src/features/feed.js: replace the `el.textContent.trim()
                    === 'Promoted'` condition
                      in isPromotedPost with a check that accepts either the exact string "Promoted" or a
                      string starting with "Promoted by ". No other logic in isPromotedPost, blockPosts, or
                      the filter-ordering pipeline changes — once a post is correctly flagged as promoted,
                      the existing hide/stats/exclusion behavior already works.
                    - tests/spec/hide-promoted-posts.spec.test.js: add
                    PROMOTED_BY_PAGE_POST,
                      PROMOTED_BY_PAGE_POST_NO_TEXTBOX, PROMOTED_BY_PAGE_POST_WITH_AUTHOR, and
                      POST_WITH_PROMOTED_BY_IN_BODY fixtures (mirroring the existing PROMOTED_POST family,
                      with a nested `<a><strong>Page Name</strong></a>` after "Promoted by" to reproduce the
                      real LinkedIn markup), plus one `it` per newly approved scenario. The three
                      "regression" scenarios (standalone "Promoted" still works) are already exercised by
                      the pre-existing tests in this file, so no duplicate tests are needed for those --
                      they just need to keep passing.
                    - tests/cucumber/screenplay/fixtures/posts.js: add the same
                    new fixtures for BDD use
                      (PROMOTED_BY_PAGE_POST, PROMOTED_BY_PAGE_POST_NO_TEXTBOX,
                      PROMOTED_BY_PAGE_POST_WITH_AUTHOR).
                    - tests/cucumber/step-definitions/hide-promoted-posts.js:
                    add When/Then step
                      definitions matching the newly approved scenarios' Given/When/Then text verbatim
                      (regex), following the file's existing verbatim-match style. Reuse the BuildFeed and
                      RunFeed screenplay tasks exactly as the existing steps do.

                    Key decisions:

                    - Match by literal prefix "Promoted by " (with trailing
                    space) rather than a looser
                      regex like /^Promoted\b/, so a hypothetical future label such as "Promoted content"
                      isn't accidentally swept in without evidence it exists on LinkedIn.
                    - Reuse the existing `!textBox?.contains(el)` exclusion
                    rather than introducing a new
                      mechanism -- this is what already keeps prose mentions of "Promoted" (and now
                      "Promoted by") inside the post body from being misdetected.
                    - No change to the `hide-promoted` toggle, storage schema,
                    or stats tracking; those are
                      unaffected by fixing the detector.

                    Step definition strategy:

                    - Each new scenario reuses `BuildFeed.with([...])` to
                    construct the post DOM and
                      `RunFeed.withConfig({ ...baseConfig, 'hide-promoted': ... })` to invoke the feed
                      processor, identical to the existing promoted-post step definitions.
                    - The "both label variants in one pass" scenario builds a
                    feed with one
                      PROMOTED_POST and one PROMOTED_BY_PAGE_POST fixture plus clean posts, and asserts
                      both index-0 and index-1 posts carry the `hide` class while later clean posts do not.
                    - The "Promoted by" in body text scenario reuses the same
                    assertion shape as the
                      existing POST_WITH_PROMOTED_IN_BODY step (post not hidden).

                    Risk / trade-offs:

                    - Matching is still a literal English-string heuristic
                    (consistent with the pre-existing
                      exact-"Promoted" approach) and won't generalize to other locales or label wordings;
                      this mirrors the existing accepted trade-off in this detector and is explicitly out of
                      scope per the proposal.
                  scenarios:
                    - name: >-
                        Standalone "Promoted" post is still hidden when toggle
                        is on
                      given:
                        - >-
                          a feed post contains a label element (outside the post
                          body) whose trimmed text is exactly "Promoted"
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - >-
                          the post is hidden with the same CSS class used for
                          keyword-matched posts
                      status: pass
                    - name: Image-only standalone "Promoted" post is still hidden
                      given:
                        - >-
                          a feed post contains a standalone "Promoted" label but
                          has no `data-testid="expandable-text-box"` element
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - the post is identified as promoted and hidden
                      status: pass
                    - name: >-
                        Standalone "Promoted" post is not hidden when toggle is
                        off
                      given:
                        - a feed post contains a standalone "Promoted" label
                        - '`hide-promoted` is `false`'
                      when:
                        - the feed processor runs
                      then:
                        - the post is left visible and unmodified
                      status: pass
                    - name: >-
                        "Promoted by <Page>" post is hidden immediately when
                        toggle is on
                      given:
                        - >-
                          a feed post contains a label element (outside the post
                          body) whose text begins with "Promoted by" followed by
                          a linked company Page name (e.g. "Promoted by PyMC
                          Labs")
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - >-
                          the post is hidden with the same CSS class used for
                          keyword-matched posts
                      status: pass
                    - name: >-
                        Image-only "Promoted by <Page>" post is hidden (no
                        expandable-text-box)
                      given:
                        - >-
                          a feed post contains a "Promoted by <Page>" label but
                          has no `data-testid="expandable-text-box"` element
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - the post is identified as promoted and hidden
                      status: pass
                    - name: >-
                        "Promoted by <Page>" post is not hidden when toggle is
                        off
                      given:
                        - a feed post contains a "Promoted by <Page>" label
                        - '`hide-promoted` is `false`'
                      when:
                        - the feed processor runs
                      then:
                        - the post is left visible and unmodified
                      status: pass
                    - name: Post with "Promoted by" only in body text is not hidden
                      given:
                        - >-
                          a feed post's body text contains the phrase "Promoted
                          by" as ordinary prose (not a sponsor label outside the
                          body)
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - the post is not hidden by the promoted-post filter
                      status: pass
                    - name: '"Promoted by <Page>" hide is counted in daily stats'
                      given:
                        - >-
                          a feed post contains a "Promoted by <Page>" label with
                          an extractable author
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - the daily postsFiltered count increments by 1
                        - >-
                          the author's vanity name is recorded in the daily
                          blocked-authors map
                      status: pass
                    - name: >-
                        "Promoted by <Page>" post is excluded from slop and
                        keyword filters
                      given:
                        - >-
                          a feed post contains a "Promoted by <Page>" label and
                          post text that would otherwise trigger slop detection
                          or a keyword match
                      when:
                        - '`hide-promoted` is `true`'
                        - '`hide-promoted` is `false`'
                      then:
                        - >-
                          when hide-promoted is true, the post is hard-hidden by
                          the promoted filter and receives no slop-collapse
                          banner
                        - >-
                          when hide-promoted is false, the post is left visible
                          and does not receive a slop-collapse banner
                      status: pass
                    - name: >-
                        Both a standalone "Promoted" post and a "Promoted by
                        <Page>" post are hidden in the same feed pass
                      given:
                        - >-
                          a feed contains one post with a standalone "Promoted"
                          label and another post with a "Promoted by <Page>"
                          label, alongside clean posts
                        - '`hide-promoted` is `true`'
                      when:
                        - the feed processor runs
                      then:
                        - >-
                          both promoted posts are hidden and the clean posts
                          remain visible
                      status: pass
                  tasks:
                    - id: '1.1'
                      description: >-
                        Add PROMOTED_BY_PAGE_POST fixture to
