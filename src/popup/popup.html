<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" type="text/css" href="popup.css" />
</head>

<body>
  <div class="home-header">
    <div class="app-title">FocusIn</div>
    <div class="app-subtitle">LinkedIn Attention Filter</div>
  </div>

  <div class="master-field">
    <label for="main-toggle" class="master-field-text">Enable FocusIn</label>
    <input
      type="checkbox"
      class="switch is-rounded"
      id="main-toggle"
      tabindex="0"
      checked
    />
    <label for="main-toggle"></label>
  </div>

  <div id="damage-report" class="px-4">
    <div class="damage-header">Today</div>
    <div class="damage-grid">
      <div class="damage-stat">
        <div class="damage-count" id="stat-slop">0</div>
        <div class="damage-label">AI flagged</div>
      </div>
      <div class="damage-stat">
        <div class="damage-count" id="stat-filtered">0</div>
        <div class="damage-label">posts filtered</div>
      </div>
    </div>
    <div id="top-signals"></div>
  </div>

  <div id="focusin-panels">
  <div id="tab-bar">
    <button type="button" id="tab-filters" class="tab-btn active">Filters</button>
    <button type="button" id="tab-authors" class="tab-btn">Authors</button>
    <button type="button" id="tab-blocked" class="tab-btn">Blocked</button>
    <button type="button" id="tab-hall-of-shame" class="tab-btn">Hall of Shame</button>
  </div>

  <div id="settings-panel" class="tab-panel active px-4 pb-4">

    <div class="divider">Ads</div>

    <div class="field">
      <label for="hide-promoted">Hide promoted posts</label>
      <input id="hide-promoted" class="switch is-rounded" type="checkbox" />
      <label for="hide-promoted"></label>
    </div>

    <div class="divider">AI content</div>

    <div class="field">
      <label for="detect-slop">Keyword/pattern detection</label>
      <input id="detect-slop" class="switch is-rounded" type="checkbox" />
      <label for="detect-slop"></label>
    </div>

    <div class="field">
      <label for="slop-archetype">Model-based detection</label>
      <input id="slop-archetype" class="switch is-rounded" type="checkbox" />
      <label for="slop-archetype"></label>
    </div>

    <div class="divider">Filter by tone</div>

    <div class="field">
      <label for="tone-filter">Negative tone filter <small>(~17 MB download on first use)</small></label>
      <input id="tone-filter" class="switch is-rounded" type="checkbox" />
      <label for="tone-filter"></label>
    </div>

    <div class="field tone-threshold-field">
      <label for="tone-threshold">Sensitivity: <span id="tone-threshold-value">70</span>%</label>
      <input id="tone-threshold" type="range" min="0" max="100" value="70" />
    </div>

    <div class="divider">Filter by keyword</div>

    <div class="field">
      <input
        id="hide-by-keywords"
        placeholder="Add keywords"
        class="tagify--outside"
      />
    </div>

    <div class="field semantic-field">
      <label>Semantic topic filter <small>(hides posts related to these topics, ~80 MB download on first use)</small></label>
      <div class="semantic-topic-wrapper">
        <ul class="semantic-topic-list">
          <li><label><input type="checkbox" class="semantic-topic" value="hustle culture" /> hustle culture</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="personal branding" /> personal branding</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="motivational quotes" /> motivational quotes</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="cryptocurrency" /> cryptocurrency</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="job interview tips" /> job interview tips</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="AI productivity tools" /> AI productivity tools</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="startup success story" /> startup success story</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="sales and lead generation" /> sales and lead generation</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="political content" /> political content</label></li>
          <li><label><input type="checkbox" class="semantic-topic" value="war and conflict" /> war and conflict</label></li>
        </ul>
        <input id="semantic-custom-topics" placeholder="Add your own topics..." class="tagify--outside" />
        <div class="semantic-diag">
          <button type="button" id="test-semantic-btn">Test model</button>
          <span id="semantic-test-result"></span>
        </div>
      </div>
    </div>

  </div>

  <div id="authors-panel" class="tab-panel px-4 pb-4">
    <div class="divider">Whitelisted authors</div>
    <div class="field authors-field">
      <input
        id="author-whitelist"
        placeholder="Add vanity name (e.g. john-doe)"
        class="tagify--outside"
      />
    </div>
  </div>

  <div id="blocked-panel" class="tab-panel px-4 pb-4">
    <div class="divider">Blocked today</div>
    <div id="author-tally-list"></div>
  </div>

  <div id="hall-of-shame-panel" class="tab-panel px-4 pb-4">
    <div class="divider">All-time AI Slop reactions</div>
    <div id="hall-of-shame-list"></div>
  </div>

  </div>

  <script language="javascript" src="../lib/tagify.min.js"></script>
  <script language="javascript" src="popup.js" type="module"></script>
</body>
