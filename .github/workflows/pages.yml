name: Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run mutate
      - name: Generate mutation summary
        if: always()
        run: node scripts/mutation-report.js
      - name: Post summary to job page
        if: always()
        run: cat reports/mutation/mutation-summary.md >> $GITHUB_STEP_SUMMARY
      - name: Generate guardrails dashboard
        if: always()
        run: node scripts/generate-guardrails-dashboard.js
      - name: Inject dashboard link into mutation report
        if: always()
        run: node scripts/inject-dashboard-link.js
      - name: Assemble Pages staging directory
        if: always()
        run: |
          mkdir -p reports/pages/insights
          cp -r reports/mutation/. reports/pages/
          cp reports/workflow-insights/index.html reports/pages/insights/index.html
      - name: Upload mutation report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/pages/

  deploy-pages:
    needs: mutation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
