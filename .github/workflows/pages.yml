name: Pages

on:
  workflow_run:
    workflows: ["Mutation"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Download mutation report artifact
        uses: actions/download-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Generate guardrails dashboard
        run: node scripts/generate-guardrails-dashboard.js
      - name: Inject dashboard link into mutation report
        run: node scripts/inject-dashboard-link.js
      - name: Assemble Pages staging directory
        run: |
          mkdir -p reports/pages/insights
          cp -r reports/mutation/. reports/pages/
          cp reports/workflow-insights/index.html reports/pages/insights/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/pages/

  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
